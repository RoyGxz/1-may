<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>1 de Mayo \u2014 Mi Universo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #c0392b;
      --red-glow: #e74c3c;
      --red-dim:  #8b1a1a;
      --black:    #050508;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--black);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 ESCENA 1 \u2014 BIENVENIDA \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    #scene1 {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--black);
      z-index: 10; padding: 2.2rem;
      transition: opacity 1s ease;
    }
    #scene1.out { opacity: 0; pointer-events: none; }

    /* Part\u00edculas */
    #s1-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .ptcl {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(192,57,43,0.55), transparent 70%);
      animation: ptclRise linear infinite;
    }
    @keyframes ptclRise {
      0%   { transform: translateY(105vh) scale(0); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.35; }
      100% { transform: translateY(-15vh) scale(1); opacity: 0; }
    }

    /* L\u00ednea vertical decorativa */
    .s1-vline {
      width: 1px; height: 55px;
      background: linear-gradient(to bottom, transparent, var(--red-dim), transparent);
      margin-bottom: 2.4rem;
      animation: risingFade 1.8s ease forwards; opacity: 0;
    }

    /* Fecha */
    .s1-date {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 13vw, 5.2rem);
      font-weight: 700; letter-spacing: 0.2em;
      color: var(--red-glow);
      text-shadow:
        0 0 18px rgba(231,76,60,0.55),
        0 0 55px rgba(192,57,43,0.28),
        0 0 110px rgba(192,57,43,0.1);
      animation: risingFade 1.2s ease 0.3s forwards; opacity: 0;
      text-align: center;
    }

    /* Divisor */
    .s1-div {
      width: 38px; height: 1px;
      background: var(--red-dim); margin: 1.7rem auto;
      animation: risingFade 1.2s ease 0.7s forwards; opacity: 0;
    }

    /* Texto rom\u00e1ntico */
    .s1-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(0.98rem, 4.4vw, 1.3rem);
      color: rgba(245,240,235,0.76);
      line-height: 1.85; text-align: center; max-width: 310px;
      letter-spacing: 0.02em;
      animation: risingFade 1.2s ease 1s forwards; opacity: 0;
    }

    /* Bot\u00f3n */
    .s1-btn {
      margin-top: 3.2rem; padding: 0.88rem 2.3rem;
      border: 1px solid var(--red-dim); background: transparent;
      color: var(--red-glow);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.82rem; letter-spacing: 0.26em; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      animation: risingFade 1.2s ease 1.4s forwards, btnPulse 3s ease 2s infinite;
      opacity: 0;
    }
    .s1-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--red);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
    }
    .s1-btn:active::before, .s1-btn:hover::before { transform: scaleX(1); }
    .s1-btn span { position: relative; z-index: 1; transition: color 0.4s; }
    .s1-btn:active span, .s1-btn:hover span { color: var(--black); }

    @keyframes risingFade {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0); }
      50%       { box-shadow: 0 0 16px 2px rgba(192,57,43,0.28); }
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 OVERLAY NEGRO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    #overlay {
      position: fixed; inset: 0; background: #000;
      z-index: 20; opacity: 0; pointer-events: none;
      transition: opacity 0.55s ease;
    }
    #overlay.on { opacity: 1; pointer-events: all; }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 ESCENA 2 \u2014 GALAXIA \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    #scene2 {
      position: fixed; inset: 0;
      z-index: 5; opacity: 0;
      transition: opacity 0.9s ease;
    }
    #scene2.on { opacity: 1; }

    #c {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }

    /* Vi\u00f1eta radial */
    #scene2::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(5,5,8,0.82) 100%);
      pointer-events: none; z-index: 2;
    }

    /* Hint */
    #hint {
      position: absolute; bottom: 2rem; left: 0; right: 0;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 0.7rem;
      letter-spacing: 0.24em; color: rgba(245,240,235,0.16);
      z-index: 3; animation: hPulse 4.5s ease infinite;
    }
    @keyframes hPulse {
      0%, 100% { opacity: 0.1; }
      50%       { opacity: 0.38; }
    }
  </style>
</head>
<body>

<div id="overlay"></div>

<!-- \u2550\u2550 ESCENA 1 \u2550\u2550 -->
<div id="scene1">
  <div id="s1-particles"></div>
  <div class="s1-vline"></div>
  <h1 class="s1-date">1 de Mayo</h1>
  <div class="s1-div"></div>
  <p class="s1-text">
    Hoy comienza un nuevo mes,<br>
    y mi mayor motivo para sonre\u00edr<br>
    es haberte conocido.
  </p>
  <button class="s1-btn" id="enterBtn"><span>Entrar al universo</span></button>
</div>

<!-- \u2550\u2550 ESCENA 2 \u2550\u2550 -->
<div id="scene2">
  <canvas id="c"></canvas>
  <div id="hint">arrastra para explorar \u00b7 gira el planeta con el dedo \u2726</div>
</div>

<script>
/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   PART\u00cdCULAS ESCENA 1
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
(function(){
  const ct = document.getElementById('s1-particles');
  for(let i=0;i<22;i++){
    const p=document.createElement('div'); p.className='ptcl';
    const s=Math.random()*95+18;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;
      animation-duration:${Math.random()*14+9}s;
      animation-delay:${Math.random()*-24}s;
      opacity:0;filter:blur(${Math.random()*15+4}px);`;
    ct.appendChild(p);
  }
})();

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TRANSICI\u00d3N
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
document.getElementById('enterBtn').addEventListener('click',()=>{
  const ov=document.getElementById('overlay');
  ov.classList.add('on');
  setTimeout(()=>{
    document.getElementById('scene1').style.display='none';
    document.getElementById('scene2').classList.add('on');
    initGalaxy();
    ov.classList.remove('on');
  },700);
});

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   GALAXIA FUSIONADA

\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
