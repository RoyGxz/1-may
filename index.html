<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Universo</title>
<style>
    html, body{
        margin:0;
        padding:0;
        overflow:hidden;
        background:black;
        font-family: 'Georgia', serif;
        color:white;
    }

    .screen{
        position:absolute;
        width:100%;
        height:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        text-align:center;
        transition:opacity 1.2s ease;
        padding:20px;
        box-sizing:border-box;
    }

    #welcome h1{
        color:#ff3b3b;
        letter-spacing:6px;
        font-size:38px;
        margin-bottom:20px;
        text-shadow:0 0 12px #ff3b3b;
        animation:fadeIn 2s ease;
    }

    #welcome p{
        font-size:18px;
        max-width:90%;
        line-height:1.6;
        opacity:0.9;
        animation:fadeIn 3s ease;
    }

    button{
        margin-top:40px;
        padding:12px 30px;
        background:transparent;
        border:1px solid #ff3b3b;
        color:#ff3b3b;
        font-size:16px;
        letter-spacing:2px;
        cursor:pointer;
        transition:0.4s;
    }

    button:hover{
        background:#ff3b3b;
        color:black;
    }

    #universe{
        opacity:0;
        pointer-events:none;
    }

    canvas{
        position:absolute;
        top:0;
        left:0;
    }

    @keyframes fadeIn{
        from{opacity:0; transform:translateY(20px);}
        to{opacity:1; transform:translateY(0);}
    }
</style>
</head>
<body>

<div id="welcome" class="screen">
    <h1>1 DE MAYO</h1>
    <p>Hoy comienza un nuevo mes, y mi mayor motivo para sonreír es haberte conocido.</p>
    <button onclick="enterUniverse()">ENTRAR AL UNIVERSO</button>
</div>

<div id="universe" class="screen">
    <canvas id="space"></canvas>
</div>

<script>
const welcome = document.getElementById('welcome');
const universe = document.getElementById('universe');
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function enterUniverse(){
    welcome.style.opacity = "0";
    setTimeout(()=>{
        welcome.style.display="none";
        universe.style.opacity="1";
        universe.style.pointerEvents="auto";
        startUniverse();
    },1200);
}

// ESTRELLAS
let stars = [];
for(let i=0;i<200;i++){
    stars.push({
        x: Math.random()*W*3 - W,
        y: Math.random()*H*3 - H,
        size: Math.random()*2,
        depth: Math.random()*2+0.5
    });
}

// FRASES
const phrases = [
"Te amo ❤️","Eres única ✨","Mi luz ⭐","Mi razón 🥰",
"Mi alegría 💖","Te cuido 🧸","Mi universo 🌌",
"Eres fuego 🔥","Mi paz 🌙","Mi felicidad 💫"
];

let texts = [];
for(let i=0;i<40;i++){
    texts.push({
        x: Math.random()*W*3 - W,
        y: Math.random()*H*3 - H,
        text: phrases[Math.floor(Math.random()*phrases.length)],
        size: 16 + Math.random()*10,
        depth: Math.random()*2+0.5
    });
}

// PLANETA
function drawPlanet(cx, cy){
    ctx.beginPath();
    ctx.fillStyle="#111";
    ctx.arc(cx, cy, 60, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="#ff3b3b";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 100, 30, 0, 0, Math.PI*2);
    ctx.stroke();
}

// MOVIMIENTO TÁCTIL
let offsetX=0, offsetY=0;
let startX=0, startY=0;
let dragging=false;

canvas.addEventListener('touchstart', e=>{
    dragging=true;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
});

canvas.addEventListener('touchmove', e=>{
    if(!dragging) return;
    let dx=e.touches[0].clientX-startX;
    let dy=e.touches[0].clientY-startY;
    offsetX+=dx*0.5;
    offsetY+=dy*0.5;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
});

canvas.addEventListener('touchend', ()=>dragging=false);

// ANIMACIÓN
function startUniverse(){
    function animate(){
        ctx.clearRect(0,0,W,H);

        // estrellas
        stars.forEach(s=>{
            ctx.fillStyle="white";
            ctx.globalAlpha=0.8;
            ctx.fillRect(s.x + offsetX*s.depth, s.y + offsetY*s.depth, s.size, s.size);
        });

        // planeta
        drawPlanet(W/2 + offsetX*0.2, H/2 + offsetY*0.2);

        // textos
        texts.forEach(t=>{
            ctx.fillStyle="white";
            ctx.font = t.size+"px Arial";
            ctx.globalAlpha=0.9;
            ctx.fillText(t.text, t.x + offsetX*t.depth, t.y + offsetY*t.depth);
        });

        requestAnimationFrame(animate);
    }
    animate();
}
</script>

</body>
</html>
