<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>1 de Mayo — Mi Universo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #c0392b;
      --red-glow: #e74c3c;
      --red-dim:  #8b1a1a;
      --black:    #050508;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--black);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ══════════════ ESCENA 1 — BIENVENIDA ══════════════ */
    #scene1 {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--black);
      z-index: 10; padding: 2.2rem;
      transition: opacity 1s ease;
    }
    #scene1.out { opacity: 0; pointer-events: none; }

    /* Partículas */
    #s1-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .ptcl {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(192,57,43,0.55), transparent 70%);
      animation: ptclRise linear infinite;
    }
    @keyframes ptclRise {
      0%   { transform: translateY(105vh) scale(0); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.35; }
      100% { transform: translateY(-15vh) scale(1); opacity: 0; }
    }

    /* Línea vertical decorativa */
    .s1-vline {
      width: 1px; height: 55px;
      background: linear-gradient(to bottom, transparent, var(--red-dim), transparent);
      margin-bottom: 2.4rem;
      animation: risingFade 1.8s ease both; opacity: 0;
    }
    .s1-date {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(3rem, 13vw, 5.2rem);
      font-weight: 700; letter-spacing: 0.2em;
      color: var(--red-glow);
      text-shadow:
        0 0 18px rgba(231,76,60,0.55),
        0 0 55px rgba(192,57,43,0.28),
        0 0 110px rgba(192,57,43,0.1);
      animation: risingFade 1.2s ease 0.3s both; opacity: 0;
      text-align: center;
    }
    .s1-div {
      width: 38px; height: 1px;
      background: var(--red-dim); margin: 1.7rem auto;
      animation: risingFade 1.2s ease 0.7s both; opacity: 0;
    }
    .s1-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(0.98rem, 4.4vw, 1.3rem);
      color: rgba(245,240,235,0.76);
      line-height: 1.85; text-align: center; max-width: 310px;
      letter-spacing: 0.02em;
      animation: risingFade 1.2s ease 1s both; opacity: 0;
    }

    /* Botón */
    .s1-btn {
      margin-top: 3.2rem; padding: 0.88rem 2.3rem;
      border: 1px solid var(--red-dim); background: transparent;
      color: var(--red-glow);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.82rem; letter-spacing: 0.26em; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      animation: risingFade 1.2s ease 1.4s both, btnPulse 3s ease 2s infinite;
      -webkit-animation: risingFade 1.2s ease 1.4s both, btnPulse 3s ease 2s infinite;
      pointer-events: all !important;
    }
    .s1-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--red);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
    }
    .s1-btn:active::before, .s1-btn:hover::before { transform: scaleX(1); }
    .s1-btn span { position: relative; z-index: 1; transition: color 0.4s; }
    .s1-btn:active span, .s1-btn:hover span { color: var(--black); }

    @keyframes risingFade {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0); }
      50%       { box-shadow: 0 0 16px 2px rgba(192,57,43,0.28); }
    }

    /* ══════════════ OVERLAY NEGRO ══════════════ */
    #overlay {
      position: fixed; inset: 0; background: #000;
      z-index: 20; opacity: 0; pointer-events: none;
      transition: opacity 0.55s ease;
    }
    #overlay.on { opacity: 1; pointer-events: all; }

    /* ══════════════ ESCENA 2 — GALAXIA ══════════════ */
    #scene2 {
      position: fixed; inset: 0;
      z-index: 5; opacity: 0;
      transition: opacity 0.9s ease;
    }
    #scene2.on { opacity: 1; }

    #c {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }

    /* Viñeta radial */
    #scene2::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(5,5,8,0.82) 100%);
      pointer-events: none; z-index: 2;
    }

    /* Hint */
    #hint {
      position: absolute; bottom: 2rem; left: 0; right: 0;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 0.7rem;
      letter-spacing: 0.24em; color: rgba(245,240,235,0.16);
      z-index: 3; animation: hPulse 4.5s ease infinite;
    }
    @keyframes hPulse {
      0%, 100% { opacity: 0.1; }
      50%       { opacity: 0.38; }
    }
  </style>
</head>
<body>

<div id="overlay"></div>

<!-- ══ ESCENA 1 ══ -->
<div id="scene1">
  <div id="s1-particles"></div>
  <div class="s1-vline"></div>
  <h1 class="s1-date">1 de Mayo</h1>
  <div class="s1-div"></div>
  <p class="s1-text">
    Hoy comienza un nuevo mes,<br>
    y mi mayor motivo para sonreír<br>
    es haberte conocido.
  </p>
  <button class="s1-btn" id="enterBtn" onclick="goToUniverse()" ontouchend="goToUniverse()"><span>Entrar al universo</span></button>
</div>

<!-- ══ ESCENA 2 ══ -->
<div id="scene2">
  <canvas id="c"></canvas>
  <div id="hint">arrastra para explorar · gira el planeta con el dedo ✦</div>
</div>

<script>
/* ══════════════════════════════════════════════════
   PARTÍCULAS ESCENA 1
══════════════════════════════════════════════════ */
(function(){
  const ct = document.getElementById('s1-particles');
  for(let i=0;i<22;i++){
    const p=document.createElement('div'); p.className='ptcl';
    const s=Math.random()*95+18;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;
      animation-duration:${Math.random()*14+9}s;
      animation-delay:${Math.random()*-24}s;
      opacity:0;filter:blur(${Math.random()*15+4}px);`;
    ct.appendChild(p);
  }
})();

/* ══════════════════════════════════════════════════
   TRANSICIÓN
══════════════════════════════════════════════════ */
let entered = false;
function goToUniverse(){
  if(entered) return;
  entered = true;
  const ov=document.getElementById('overlay');
  ov.classList.add('on');
  setTimeout(()=>{
    document.getElementById('scene1').style.display='none';
    document.getElementById('scene2').classList.add('on');
    initGalaxy();
    ov.classList.remove('on');
  },700);
}
document.getElementById('enterBtn').addEventListener('click', goToUniverse);

/* ══════════════════════════════════════════════════
   GALAXIA FUSIONADA
   – Pan libre (como el código original)
   – Órbita 360° automática + táctil en el planeta
   – Estética premium con glow, tipografía serif, colores
══════════════════════════════════════════════════ */
function initGalaxy(){
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d');

  let W,H;
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  window.addEventListener('resize',resize); resize();

  /* ─── UNIVERSO PALABRAS — lista extensa y romántica ─── */
  const ALL_PHRASES = [
    // ❤ Amor profundo
    { t:'Te amo ❤️',             c:'#e74c3c' },
    { t:'Te amo más cada día 💓', c:'#e74c3c' },
    { t:'Eres mi amor ❤',        c:'#e74c3c' },
    { t:'Amor eterno 💞',         c:'#e86070' },
    { t:'Mi corazón 💗',          c:'#f08090' },
    { t:'Mi gran amor 🌹',        c:'#e85060' },
    { t:'Infinitamente tuya 💘',  c:'#e874b0' },
    // ✨ Admiración
    { t:'Eres única ✨',           c:'#f5f0eb' },
    { t:'Irrepetible 🌺',         c:'#f8b0a0' },
    { t:'Extraordinaria 🦋',      c:'#d0a8f8' },
    { t:'Invaluable 💎',          c:'#78d0f8' },
    { t:'Impresionante 🌠',       c:'#90b8f8' },
    { t:'Eres arte 🎨',           c:'#d080f0' },
    { t:'Eres perfecta 🌸',       c:'#f8b0c8' },
    { t:'Tan hermosa 🌷',         c:'#f8a8c8' },
    { t:'Sublime ✦',              c:'#ffffff' },
    // 🌟 Luz y universo
    { t:'Mi luz ⭐',              c:'#f0d070' },
    { t:'Mi estrella 🌟',         c:'#f8e080' },
    { t:'Mi universo 🌌',         c:'#8090d8' },
    { t:'Mi cosmos 🪐',           c:'#a090e8' },
    { t:'Mi galaxia 🔭',          c:'#7880d0' },
    { t:'Mi cielo 🌙',            c:'#a0b8f8' },
    { t:'Mi sol ☀️',              c:'#f8d060' },
    { t:'Mi luna 🌛',             c:'#d0d8f8' },
    // 🥰 Ternura
    { t:'Mi razón 🥰',            c:'#e8a090' },
    { t:'Mi alegría 💖',          c:'#e74c3c' },
    { t:'Mi sonrisa 😊',          c:'#f8c870' },
    { t:'Mi dulzura 🍯',          c:'#f0c060' },
    { t:'Te cuido 🧸',            c:'#d4a0b0' },
    { t:'Mi ternura 🌼',          c:'#f0d8a0' },
    { t:'Tan tierna 🐾',          c:'#e8b8c8' },
    // 🔥 Pasión
    { t:'Eres fuego 🔥',          c:'#e8602c' },
    { t:'Me enciendes 🕯️',       c:'#f09040' },
    { t:'Eres magia 🪄',          c:'#c070d8' },
    { t:'Eres pura magia ✨',     c:'#d090e8' },
    { t:'Me hechizas 💜',         c:'#c060d0' },
    // 🏡 Hogar y paz
    { t:'Mi hogar 🏡',            c:'#e8c870' },
    { t:'Mi refugio 🌊',          c:'#70c8e8' },
    { t:'Mi calma 🕊️',           c:'#90d0c8' },
    { t:'Mi paz 🌿',              c:'#80d0a0' },
    { t:'Mi descanso 🌸',         c:'#f0c8d8' },
    { t:'Donde pertenezco 🫂',    c:'#e0c0b0' },
    // 💫 Promesas y tiempo
    { t:'Siempre 🤍',             c:'#f5f0eb' },
    { t:'Eternamente 🌠',         c:'#90b8f8' },
    { t:'Para siempre 💫',        c:'#c0b870' },
    { t:'Cada día más 📅',        c:'#a8d8a8' },
    { t:'El resto de mi vida 🌹', c:'#e86080' },
    { t:'Hasta el infinito ♾️',   c:'#8090d8' },
    // 🌺 Poesía
    { t:'Mi todo 💫',             c:'#c0b870' },
    { t:'Mi vida 🌹',             c:'#f0a090' },
    { t:'Mi poema 📖',            c:'#f0d090' },
    { t:'Mi canción 🎵',          c:'#f0b8d0' },
    { t:'Mi historia 📜',         c:'#d8c0a0' },
    { t:'Mi sueño 💭',            c:'#b0c0f8' },
    { t:'Mi fuerza 💪🏻',          c:'#e8d080' },
    { t:'Mi motivo 🌺',           c:'#f0a0b0' },
    { t:'Mi orgullo 🏆',          c:'#f0d060' },
    { t:'Mi aventura 🗺️',        c:'#a0d0c0' },
    { t:'Mi presente 🎁',         c:'#f0b060' },
    { t:'Mi futuro 🌅',           c:'#f0c880' },
    { t:'Me completas 🧩',        c:'#d0c8f8' },
    { t:'Eres todo ✦',            c:'#ffffff' },
  ];

  /* ─── ESTRELLAS dispersas por la galaxia ─── */
  const GALAXY_SIZE = 4000;  // espacio virtual total
  const stars = Array.from({length:400},()=>({
    x: Math.random()*GALAXY_SIZE - GALAXY_SIZE/2,
    y: Math.random()*GALAXY_SIZE - GALAXY_SIZE/2,
    r: Math.random()*1.6+0.12,
    a: Math.random()*0.65+0.35,
    twS: Math.random()*0.02+0.004,
    twO: Math.random()*Math.PI*2,
    depth: Math.random()*0.7+0.3,  // parallax al hacer pan
  }));

  /* ─── TEXTOS dispersos por toda la galaxia ─── */
  // Instancias: algunas palabras aparecen varias veces en distintos lugares
  const texts = [];
  const INSTANCES = 90;  // total de palabras en el espacio
  for(let i=0;i<INSTANCES;i++){
    const p = ALL_PHRASES[Math.floor(Math.random()*ALL_PHRASES.length)];
    texts.push({
      x:    Math.random()*GALAXY_SIZE - GALAXY_SIZE/2,
      y:    Math.random()*GALAXY_SIZE - GALAXY_SIZE/2,
      text: p.t,
      color:p.c,
      size: 11 + Math.random()*9,
      depth:Math.random()*0.6+0.25,
      floatAmp: Math.random()*9+3,
      floatSpd: Math.random()*0.0012+0.0003,
      floatOff: Math.random()*Math.PI*2,
      glowI:    Math.random()*0.35+0.65,
      glowSpd:  Math.random()*0.004+0.002,
      glowOff:  Math.random()*Math.PI*2,
    });
  }

  /* ─── PALABRAS EN ÓRBITA alrededor del planeta ─── */
  const ORBIT_WORDS = [
    // Órbita 0 — radio 115
    { t:'Te amo ❤️',        c:'#e74c3c', r:115, sm:1.5 },
    { t:'Mi vida 🌹',        c:'#f0a090', r:115, sm:1.5 },
    { t:'Siempre 🤍',        c:'#f5f0eb', r:115, sm:1.5 },
    { t:'Mi cielo 🌙',       c:'#a0b8f8', r:115, sm:1.5 },
    { t:'Mi sol ☀️',         c:'#f8d060', r:115, sm:1.5 },
    // Órbita 1 — radio 200
    { t:'Eres única ✨',      c:'#f5f0eb', r:200, sm:1.0 },
    { t:'Mi luz ⭐',          c:'#f0d070', r:200, sm:1.0 },
    { t:'Mi razón 🥰',        c:'#e8a090', r:200, sm:1.0 },
    { t:'Mi alegría 💖',      c:'#e74c3c', r:200, sm:1.0 },
    { t:'Mi universo 🌌',     c:'#8090d8', r:200, sm:1.0 },
    { t:'Te cuido 🧸',        c:'#d4a0b0', r:200, sm:1.0 },
    { t:'Mi paz 🌿',          c:'#80d0a0', r:200, sm:1.0 },
    // Órbita 2 — radio 295
    { t:'Eres fuego 🔥',      c:'#e8602c', r:295, sm:0.7 },
    { t:'Mi todo 💫',         c:'#c0b870', r:295, sm:0.7 },
    { t:'Eres magia 🪄',      c:'#c070d8', r:295, sm:0.7 },
    { t:'Mi calma 🕊️',       c:'#90d0c8', r:295, sm:0.7 },
    { t:'Eres perfecta 💎',   c:'#78d0f8', r:295, sm:0.7 },
    { t:'Mi hogar 🏡',        c:'#e8c870', r:295, sm:0.7 },
    { t:'Invaluable 🌺',      c:'#f8b0a0', r:295, sm:0.7 },
    { t:'Eres arte 🎨',       c:'#d080f0', r:295, sm:0.7 },
    // Órbita 3 — radio 400
    { t:'Infinitamente 💞',   c:'#e874c0', r:400, sm:0.46},
    { t:'Irrepetible 🌠',     c:'#90b8f8', r:400, sm:0.46},
    { t:'Mi corazón 💓',      c:'#e74c3c', r:400, sm:0.46},
    { t:'Mi poema 📖',        c:'#f0d090', r:400, sm:0.46},
    { t:'Eres todo ✦',        c:'#ffffff', r:400, sm:0.46},
    { t:'Eternamente 🌸',     c:'#f8b0c8', r:400, sm:0.46},
    { t:'Mi sueño 💭',        c:'#b0c0f8', r:400, sm:0.46},
    { t:'Mi refugio 🌊',      c:'#70c8e8', r:400, sm:0.46},
    { t:'Tan hermosa 🌷',     c:'#f8a8c8', r:400, sm:0.46},
    { t:'Mi fuerza 💪🏻',      c:'#e8d080', r:400, sm:0.46},
  ];

  // Distribuir uniformemente por órbita
  const oCount={}; ORBIT_WORDS.forEach(w=>oCount[w.r]=(oCount[w.r]||0)+1);
  const oIdx={};
  const orbitObjs = ORBIT_WORDS.map(w=>{
    oIdx[w.r]=oIdx[w.r]||0;
    const idx=oIdx[w.r]++; const total=oCount[w.r];
    const baseAngle=(idx/total)*Math.PI*2;
    const tilt=0.26+Math.random()*0.12;
    return {
      text:w.t, color:w.c, orbitR:w.r, speedMult:w.sm,
      baseAngle, tilt,
      floatAmp:Math.random()*9+3,
      floatSpd:Math.random()*0.0012+0.0003,
      floatOff:Math.random()*Math.PI*2,
      glowI:   Math.random()*0.3+0.7,
      glowSpd: Math.random()*0.004+0.002,
      glowOff: Math.random()*Math.PI*2,
      fontSize:Math.random()*5+10,
    };
  });

  /* ─── Estado de interacción ─── */
  // PAN (explorar la galaxia)
  let panX=0, panY=0, panVelX=0, panVelY=0;
  // ORBIT (girar el planeta)
  let orbitAngle=0;
  const AUTO_SPIN=0.0007;
  let spinVel=0;

  let isDragging=false;
  let lastX=0, lastY=0;
  let dragDX=0;  // para calcular si es más giro u pan

  canvas.addEventListener('touchstart',e=>{
    isDragging=true;
    lastX=e.touches[0].clientX;
    lastY=e.touches[0].clientY;
    panVelX=panVelY=spinVel=0;
    e.preventDefault();
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    const dx=e.touches[0].clientX-lastX;
    const dy=e.touches[0].clientY-lastY;
    // Pan de galaxia (movimiento libre)
    panX+=dx*0.55; panY+=dy*0.55;
    panVelX=dx*0.55; panVelY=dy*0.55;
    // Giro orbital también (X controla spin)
    spinVel=dx*0.003;
    orbitAngle+=spinVel;
    lastX=e.touches[0].clientX;
    lastY=e.touches[0].clientY;
    e.preventDefault();
  },{passive:false});

  canvas.addEventListener('touchend',()=>{ isDragging=false; });

  canvas.addEventListener('mousedown',e=>{
    isDragging=true; lastX=e.clientX; lastY=e.clientY;
    panVelX=panVelY=spinVel=0;
  });
  canvas.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    const dx=e.clientX-lastX, dy=e.clientY-lastY;
    panX+=dx*0.55; panY+=dy*0.55;
    panVelX=dx*0.55; panVelY=dy*0.55;
    spinVel=dx*0.003; orbitAngle+=spinVel;
    lastX=e.clientX; lastY=e.clientY;
  });
  canvas.addEventListener('mouseup',()=>{ isDragging=false; });
  canvas.addEventListener('mouseleave',()=>{ isDragging=false; });

  /* ─── Planeta ─── */
  function drawPlanet(cx,cy){
    const R=Math.min(W,H)*0.088;
    ctx.save(); ctx.translate(cx,cy);

    // Halo
    const halo=ctx.createRadialGradient(0,0,R*0.5,0,0,R*3.2);
    halo.addColorStop(0,'rgba(192,57,43,0.13)');
    halo.addColorStop(0.5,'rgba(70,8,8,0.05)');
    halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo;
    ctx.beginPath(); ctx.arc(0,0,R*3.2,0,Math.PI*2); ctx.fill();

    // Anillo trasero
    ctx.save(); ctx.scale(1,0.3);
    ctx.beginPath(); ctx.arc(0,0,R*2.2,Math.PI,Math.PI*2);
    ctx.lineWidth=R*0.3; ctx.strokeStyle='rgba(128,38,33,0.52)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,R*2.4,Math.PI,Math.PI*2);
    ctx.lineWidth=1; ctx.strokeStyle='rgba(200,68,52,0.18)'; ctx.stroke();
    ctx.restore();

    // Cuerpo
    const body=ctx.createRadialGradient(-R*0.3,-R*0.3,0,0,0,R);
    body.addColorStop(0,'#3d1212');
    body.addColorStop(0.45,'#1e0808');
    body.addColorStop(1,'#080205');
    ctx.fillStyle=body;
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fill();

    // Luz especular
    const shine=ctx.createRadialGradient(-R*0.32,-R*0.32,0,-R*0.1,-R*0.1,R*0.85);
    shine.addColorStop(0,'rgba(230,88,68,0.2)');
    shine.addColorStop(0.5,'rgba(175,48,38,0.07)');
    shine.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=shine;
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fill();

    // Anillo frontal
    ctx.save(); ctx.scale(1,0.3);
    ctx.beginPath(); ctx.arc(0,0,R*2.2,0,Math.PI);
    ctx.lineWidth=R*0.3; ctx.strokeStyle='rgba(196,68,52,0.64)'; ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  /* ─── Función render texto con glow ─── */
  function renderText(txt,col,wx,wy,fs,glowMult,alphaScale){
    ctx.save();
    ctx.font=`${fs}px 'Cormorant Garamond',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor=col; ctx.shadowBlur=14*glowMult;
    ctx.globalAlpha=glowMult*0.88*alphaScale;
    ctx.fillStyle=col;
    ctx.fillText(txt,wx,wy);
    ctx.shadowBlur=3;
    ctx.globalAlpha=glowMult*0.42*alphaScale;
    ctx.fillText(txt,wx,wy);
    ctx.restore();
  }
